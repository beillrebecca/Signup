<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Recomen - 新規登録</title>
  <link href="https://fonts.googleapis.com/css2?family=Galada&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="signup-container">
  <div class="signup-box">

    <div class="signup-logo">Recomen</div>

    <!-- メール -->
<input type="text" id="contactEmail" placeholder="メールアドレス">

<!-- 電話番号 -->
<input type="text" id="contactPhone" placeholder="電話番号（例: +819012345678）">

<!-- 確認コード -->
<input type="text" id="phoneCode" placeholder="電話番号確認コード">

<!-- ユーザーネーム -->
<input type="text" id="newUsername" placeholder="ユーザーネーム">

<!-- パスワード -->
<input type="password" id="newPassword" placeholder="パスワード">

<button id="signupBtn">登録</button>
<button id="sendPhoneCodeBtn">確認コード送信</button>

<!-- reCAPTCHA コンテナ -->
<div id="recaptcha-container"></div>
</div>

<!-- Firebase App (必須) -->
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<!-- Firebase Authentication -->
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>

<script src="script.js"></script>
</body>
</html>
