<body>
<div class="signup-container">
  <div class="signup-box">

    <div class="signup-logo">Recomen</div>

     <!-- 入力 -->
    <input type="text" id="contact" placeholder="メールアドレスまたは電話番号">
    <input type="password" id="password" placeholder="パスワード">
    <input type="password" id="passwordConfirm" placeholder="パスワード（確認）">

    <!-- ボタン -->

  </div>
</div
