<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Recomen - 新規登録</title>
  <link href="https://fonts.googleapis.com/css2?family=Galada&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="signup-container">
  <div class="signup-box">

    <!-- ロゴ -->
    <div class="signup-logo">Recomen</div>

    <!-- メールアドレスまたは電話番号 -->
    <input type="text" id="contact" placeholder="メールアドレスまたは電話番号">

    <!-- パスワード -->
    <input type="password" id="password" placeholder="パスワード">
    <input type="password" id="passwordConfirm" placeholder="パスワード（確認）">

    <!-- 登録ボタン -->
    <button id="signupBtn">登録</button>

    <!-- reCAPTCHA（電話番号認証用） -->
    <div id="recaptcha-container"></div>

    <!-- 補足メッセージ -->
    <p class="signup-note">
      メールアドレスで登録すると、確認コードをメールで送信します。<br>
      電話番号で登録すると、SMSで確認コードを送信します。
    </p>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth-compat.js"></script>

<script>
  // Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyCo1YZczL9GYsYkW4L2XBEM-SBWRvEUUUo",
    authDomain: "recomen-91703.firebaseapp.com",
    projectId: "recomen-91703",
    storageBucket: "recomen-91703.appspot.com",
    messagingSenderId: "361705732453",

  };
  firebase.initializeApp(firebaseConfig);
</script>

<!-- Signup JS -->
<script src="signup.js"></script>
</body>
</html>
