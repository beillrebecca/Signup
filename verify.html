<body>
<div class="verify-container">
  <div class="verify-box">

    <!-- ロゴ -->
    <div class="verify-logo">Recomen</div>

    <!-- 説明 -->
    <p class="verify-text">
      確認コードを入力してください
    </p>

    <!-- コード入力 -->
    <input type="text" id="code" placeholder="確認コード">

    <!-- 認証ボタン -->
    <button id="verifyBtn">認証</button>

    <!-- 再送信 -->
    <p id="resendCode" class="resend">
      コードを再送信
    </p>

  </div>
</div>
